<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="chat-sidebar">
    <div class="p-3 border-end bg-light h-100">
        <div class="chat-sidebar-header d-flex align-items-center justify-content-between mb-3">
            <h5 class="mb-0" th:text="#{chat.sidebar.title}">Chats</h5>
            <div class="chat-sidebar-actions d-flex align-items-center gap-1">
                <button class="btn btn-sm chat-sidebar-icon-btn"
                        id="newChatBtn"
                        th:attr="aria-label=#{chat.new},title=#{chat.new}"
                        type="button">
                    <i aria-hidden="true" class="bi bi-plus-lg"></i>
                </button>
                <div class="dropdown">
                    <button aria-expanded="false"
                            class="btn btn-sm chat-sidebar-icon-btn dropdown-toggle-no-caret"
                            data-bs-toggle="dropdown"
                            id="chatSidebarMenuBtn"
                            th:attr="aria-label=#{chat.sidebar.menu},title=#{chat.sidebar.menu}"
                            type="button">
                        <i aria-hidden="true" class="bi bi-three-dots-vertical"></i>
                    </button>
                    <ul aria-labelledby="chatSidebarMenuBtn" class="dropdown-menu dropdown-menu-end shadow-sm">
                        <li>
                            <button class="dropdown-item" id="exportBundleBtn" th:text="#{chat.export_all}" type="button">
                                Export All (JSON)
                            </button>
                        </li>
                        <li><hr class="dropdown-divider"/></li>
                        <li>
                            <button class="dropdown-item text-danger"
                                    data-bs-target="#deleteAllDataModal"
                                    data-bs-toggle="modal"
                                    id="deleteAllDataBtn"
                                    th:text="#{chat.delete_all}"
                                    type="button">
                                Delete All Data
                            </button>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
        <ul class="chat-list list-unstyled mb-0" id="chatList">
            <li class="chat-item d-flex justify-content-between align-items-start"
                th:classappend="${currentChat != null and currentChat.id() == chat.id()} ? 'chat-item--active' : ''"
                th:data-chat-id="${chat.id}"
                th:each="chat : ${chats}">
                <div class="flex-grow-1 chat-select-area" style="cursor: pointer;">
                    <div class="fw-bold">
                        <span th:if="${chat.name() != null and !#strings.isEmpty(chat.name())}" th:text="${chat.name()}"></span>
                        <span th:unless="${chat.name() != null and !#strings.isEmpty(chat.name())}" th:text="#{chat.untitled}">Untitled</span>
                    </div>
                    <small class="text-muted" th:text="${#temporals.format(chat.lastActivityAt(), 'yyyy-MM-dd HH:mm')}"></small>
                </div>
                <button class="btn btn-sm btn-outline-danger ms-2 chat-delete-btn"
                        th:attr="aria-label=#{chat.delete},title=#{chat.delete}"
                        th:data-chat-id="${chat.id}"
                        type="button">
                    <span aria-hidden="true">&times;</span>
                </button>
            </li>
        </ul>
    </div>
</th:block>
</body>
</html>
