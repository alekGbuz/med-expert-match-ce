<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head}">
    <title>MedExpertMatch - Harness Chains</title>
</head>
<body>
<header th:replace="~{fragments/header :: header}"></header>
<main class="container-fluid py-4">
    <div class="row">
        <div class="col-12 col-lg-10">
            <h1 class="h3 mb-4">Harness Event Chains</h1>
            <p class="text-muted mb-4">Recent analysis → match → recommend handoffs (session ids hashed).</p>

            <div class="card mb-4">
                <div class="card-header">Recent chains</div>
                <div class="card-body p-0">
                    <table class="table table-striped mb-0">
                        <thead>
                        <tr>
                            <th>Root Session Hash</th>
                            <th>Case ID</th>
                            <th>Steps</th>
                            <th>Last Updated</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${#lists.isEmpty(chains)}">
                            <td class="text-muted" colspan="4">No chain events recorded yet.</td>
                        </tr>
                        <tr th:each="chain : ${chains}">
                            <td><code class="small" th:text="${chain.chainRootSessionIdHash}">hash</code></td>
                            <td><code th:text="${chain.caseId}">case</code></td>
                            <td><span th:each="step,iter : ${chain.steps}"><code th:text="${step}">STEP</code><span th:if="${!iter.last}"> → </span></span></td>
                            <td th:text="${chain.lastUpdatedAt}">time</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="card">
                <div class="card-header">Failed runs — backlog starter</div>
                <div class="card-body">
                    <div th:if="${#lists.isEmpty(failedRuns)}" class="text-muted">No failed harness runs.</div>
                    <div th:each="run : ${failedRuns}" class="mb-3">
                        <h6 class="mb-1"><code th:text="${run.runId}">run</code> · <span th:text="${run.workflowType}">TYPE</span></h6>
                        <pre class="bg-light p-2 small mb-0" th:text="${run.backlogMarkdown}">backlog</pre>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
